<!DOCTYPE html>

  <!-- Tailwind CSS via CDN -->

<body class="min-h-screen antialiased selection:bg-[#0EA5E9] selection:text-white">

  <!-- Mobile Drawer Overlay Menu -->

  <section class="py-16 sm:py-24 max-w-4xl mx-auto px-4 sm:px-6">
